# Local development overrides — auto-merged by Docker Compose CLI, ignored by Coolify.
# Volumes use named fallbacks from docker-compose.yml (no changes needed).
# Only adds host port bindings for local browser access.
services:
  prefect-server:
    ports:
      - "4200:4200"

  minio:
    ports:
      - "9001:9001"

  vanna:
    ports:
      - "8084:8084"

  nginx:
    ports:
      - "8080:80"
