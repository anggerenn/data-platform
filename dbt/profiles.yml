default:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('ANALYTICS_DB_HOST') }}"
      port: 5432
      user: "{{ env_var('ANALYTICS_DB_USER') }}"
      password: "{{ env_var('ANALYTICS_DB_PASSWORD') }}"
      dbname: "{{ env_var('ANALYTICS_DB_NAME', 'analytics') }}"
      schema: transformed
