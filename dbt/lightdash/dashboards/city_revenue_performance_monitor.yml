  properties:
    title: How to use this dashboard
    hideTitle: false
    content: '## Overview

      This dashboard tracks daily revenue performance across cities, helping sales
      managers quickly identify underperforming regions and take proactive measures
      to optimize resource allocation and sales strategies.


      ## Questions this answers

      - Which city had the largest revenue drop compared to last month?

      - What categories are driving revenue growth in our top-performing cities?

      - Which cities need immediate attention based on today''s revenue performance?

      - How does category performance vary between struggling and thriving cities?

      - Which regions should receive additional marketing resources based on month-over-month
      trends?


      ## Tips

      - Use the Order Date filter to compare specific days or date ranges across cities
      - especially useful for identifying weekend vs weekday performance patterns.

      - Drill down into Category dimension within underperforming cities to see if
      specific product lines are driving revenue declines, which can inform inventory
      adjustments.'
    hideFrame: false
