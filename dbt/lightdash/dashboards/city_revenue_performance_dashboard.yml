  properties:
    title: How to use this dashboard
    hideTitle: false
    content: '## Overview

      This dashboard shows total revenue performance across cities, product categories,
      and time periods, helping sales managers identify top-performing regions and
      track revenue trends to optimize sales strategies.


      ## Questions this answers

      - Which city generated the highest total revenue in the selected date range?

      - What product category drives the most revenue in a specific city?

      - How has revenue trended over time for a particular city or category?

      - Which city-category combinations are underperforming compared to others?

      - What is the revenue distribution across different product categories for the
      current quarter?


      ## Tips

      - Use the date range filter to compare performance across different time periods
      (e.g., Q1 vs Q2, this year vs last year)

      - Combine city and category filters together to drill down into specific market
      segments and identify growth opportunities'
    hideFrame: false
