<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Lightdash iframe ─────────────────────────────────── */
    #lightdash-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Widget root ──────────────────────────────────────── */
    #widget {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* ── Chat panel ───────────────────────────────────────── */
    #chat-panel {
      display: none;
      flex-direction: column;
      width: 380px;
      height: 540px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      margin-bottom: 12px;
      overflow: hidden;
    }
    #chat-panel.open { display: flex; }

    .panel-header {
      background: #7262ff;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .panel-header button {
      background: none;
      border: none;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }

    /* ── Messages ─────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 92%;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #7262ff;
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #f3f3f6;
      color: #222;
      border-bottom-left-radius: 3px;
    }

    /* ── SQL toggle ───────────────────────────────────────── */
    .sql-toggle {
      margin-top: 8px;
      background: none;
      border: none;
      color: #7262ff;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }
    .sql-code {
      display: none;
      margin-top: 5px;
      background: #f7f7fb;
      border: 1px solid #e0e0e8;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #333;
      max-height: 120px;
      overflow-y: auto;
    }

    /* ── Data table ───────────────────────────────────────── */
    .data-table-wrap {
      margin-top: 8px;
      border: 1px solid #e8e8ee;
      border-radius: 6px;
      overflow: auto;
      max-height: 150px;
    }
    .data-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 11.5px;
    }
    .data-table th {
      background: #f5f5fa;
      padding: 5px 10px;
      text-align: left;
      border-bottom: 1px solid #e0e0e8;
      white-space: nowrap;
      font-weight: 600;
      color: #555;
    }
    .data-table td {
      padding: 4px 10px;
      border-bottom: 1px solid #f0f0f5;
      white-space: nowrap;
      color: #333;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }

    .row-count {
      margin-top: 5px;
      font-size: 11px;
      color: #999;
    }

    /* ── Typing indicator ─────────────────────────────────── */
    .typing-wrap {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 2px 4px;
    }
    .typing-wrap span {
      width: 7px;
      height: 7px;
      background: #bbb;
      border-radius: 50%;
      animation: bounce 1.1s infinite;
    }
    .typing-wrap span:nth-child(2) { animation-delay: 0.18s; }
    .typing-wrap span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Input area ───────────────────────────────────────── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #ebebf0;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      padding: 8px 11px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: #7262ff; }
    #user-input:disabled { background: #f5f5f5; }

    #send-btn {
      background: #7262ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #send-btn:disabled { opacity: 0.45; cursor: default; }

    /* ── Floating button ──────────────────────────────────── */
    #chat-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #7262ff;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(114, 98, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #chat-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 20px rgba(114, 98, 255, 0.55);
    }
    #chat-btn svg { pointer-events: none; }
  </style>
</head>
<body>

<iframe id="lightdash-frame" src="{{LIGHTDASH_URL}}" allowfullscreen></iframe>

<div id="widget">
  <div id="chat-panel">
    <div class="panel-header">
      <span>✦ Ask your data</span>
      <button onclick="togglePanel()" title="Close">&#x2715;</button>
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <input id="user-input" type="text" placeholder="Ask a question…"
             onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }">
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <button id="chat-btn" onclick="togglePanel()" title="Ask your data">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
</div>

<script>
  // Conversation history — passed back on every request (row-stripped server-side)
  let history = [];
  let isOpen = false;

  function togglePanel() {
    isOpen = !isOpen;
    document.getElementById('chat-panel').classList.toggle('open', isOpen);
    if (isOpen) document.getElementById('user-input').focus();
  }

  // ── DOM helpers ──────────────────────────────────────────

  function scrollToBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function appendMessage(role, contentEl) {
    const bubble = document.createElement('div');
    bubble.className = `msg ${role}`;
    if (typeof contentEl === 'string') {
      bubble.textContent = contentEl;
    } else {
      bubble.appendChild(contentEl);
    }
    document.getElementById('messages').appendChild(bubble);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const bubble = document.createElement('div');
    bubble.className = 'msg assistant';
    bubble.id = 'typing-bubble';
    bubble.innerHTML = '<div class="typing-wrap"><span></span><span></span><span></span></div>';
    document.getElementById('messages').appendChild(bubble);
    scrollToBottom();
    return bubble;
  }

  // ── Minimal markdown → HTML ──────────────────────────────

  function md(text) {
    // Escape HTML first to prevent XSS
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const lines = text.split('\n');
    const out = [];
    let listType = null; // 'ol' | 'ul' | null

    const flushList = () => {
      if (listType) { out.push(`</${listType}>`); listType = null; }
    };

    const inline = raw => esc(raw)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,     '<em>$1</em>')
      .replace(/`([^`]+)`/g,     '<code style="background:#f0f0f5;padding:1px 4px;border-radius:3px;font-size:11px">$1</code>');

    for (const line of lines) {
      const ol = line.match(/^(\d+)\.\s+(.*)/);
      const ul = line.match(/^[-*]\s+(.*)/);

      if (ol) {
        if (listType !== 'ol') { flushList(); out.push('<ol style="margin:.4em 0 .4em 1.4em;padding:0">'); listType = 'ol'; }
        out.push(`<li>${inline(ol[2])}</li>`);
      } else if (ul) {
        if (listType !== 'ul') { flushList(); out.push('<ul style="margin:.4em 0 .4em 1.4em;padding:0">'); listType = 'ul'; }
        out.push(`<li>${inline(ul[1])}</li>`);
      } else {
        flushList();
        out.push(line === '' ? '<br>' : `<span>${inline(line)}</span><br>`);
      }
    }
    flushList();

    // Clean up leading/trailing lone <br>
    return out.join('').replace(/^(<br>)+/, '').replace(/(<br>)+$/, '');
  }

  // ── Response renderer ────────────────────────────────────

  function renderResult(result) {
    const wrap = document.createElement('div');

    // Text answer (markdown rendered)
    const textEl = document.createElement('div');
    textEl.innerHTML = md(result.text);
    wrap.appendChild(textEl);

    // SQL collapsible (explore only)
    if (result.sql) {
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'sql-toggle';
      toggleBtn.textContent = '▶ view sql';

      const codeEl = document.createElement('pre');
      codeEl.className = 'sql-code';
      codeEl.textContent = result.sql;

      toggleBtn.onclick = () => {
        const open = codeEl.style.display === 'block';
        codeEl.style.display = open ? 'none' : 'block';
        toggleBtn.textContent = open ? '▶ view sql' : '▼ hide sql';
      };

      wrap.appendChild(toggleBtn);
      wrap.appendChild(codeEl);
    }

    // Data table (explore only)
    if (result.data && result.data.length > 0 && result.columns) {
      const tableWrap = document.createElement('div');
      tableWrap.className = 'data-table-wrap';

      const table = document.createElement('table');
      table.className = 'data-table';

      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');
      result.columns.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      result.data.forEach(row => {
        const tr = document.createElement('tr');
        result.columns.forEach(col => {
          const td = document.createElement('td');
          const val = row[col];
          if (val === null || val === undefined) {
            td.textContent = '—';
          } else if (typeof val === 'number') {
            td.textContent = Number.isInteger(val) ? val.toLocaleString()
              : val.toLocaleString(undefined, { maximumFractionDigits: 2 });
          } else {
            td.textContent = val;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableWrap.appendChild(table);
      wrap.appendChild(tableWrap);

      const countEl = document.createElement('div');
      countEl.className = 'row-count';
      countEl.textContent = `${result.row_count} row${result.row_count !== 1 ? 's' : ''}`;
      wrap.appendChild(countEl);
    }

    return wrap;
  }

  // ── Send message ─────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;

    appendMessage('user', question);
    const typingBubble = showTyping();

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: question, history }),
      });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const result = await resp.json();

      typingBubble.remove();

      // Maintain history — new_messages already row-stripped by server
      history = history.concat(result.new_messages || []);

      appendMessage('assistant', renderResult(result));
    } catch (err) {
      typingBubble.remove();
      appendMessage('assistant', 'Something went wrong. Please try again.');
      console.error(err);
    }

    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
